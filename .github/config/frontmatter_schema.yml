# =========================================================================
# Frontmatter Schema Configuration
# =========================================================================
# Single source of truth for frontmatter validation rules across all
# Jekyll collections. Referenced by scripts/lint-pages,
# scripts/lib/frontmatter.sh, and the test suite.
#
# Located alongside existing lint configs (.markdownlint.json, .yamllint.yml)
# =========================================================================

schema_version: "1.0"

# -------------------------------------------------------------------------
# Global rules inherited by all collections
# -------------------------------------------------------------------------
global:
  date_format: "iso8601"
  draft_type: "boolean"
  canonical_fields:
    estimated_time: estimated_reading_time
    updated: lastmod
  required_fields:
    - title
    - lastmod

# -------------------------------------------------------------------------
# Field type definitions (shared reference for validation)
# -------------------------------------------------------------------------
field_types:
  datetime:
    pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]{3})?Z)?$'
    fix: "append_iso8601_suffix"
  boolean:
    allowed:
      - true
      - false
    fix: "string_to_boolean"
  string:
    pattern: '.+'
  array:
    type: "list"
  choice:
    type: "enum"

# -------------------------------------------------------------------------
# Per-collection schemas
# -------------------------------------------------------------------------
collections:
  posts:
    path_pattern: "pages/_posts/**/*.md"
    required:
      - title
      - date
      - lastmod
      - description
      - layout
      - categories
      - tags
      - author
    optional:
      - featured
      - draft
      - preview
      - estimated_reading_time
      - keywords
      - breaking
      - learning_outcomes
      - technical_requirements
      - sub-title
      - excerpt
      - snippet
      - permalink
      - comments
    layout:
      allowed:
        - article
        - section
        - news

  docs:
    path_pattern: "pages/_docs/**/*.md"
    required:
      - title
      - description
      - lastmod
      - layout
      - categories
      - tags
    optional:
      - difficulty
      - estimated_reading_time
      - prerequisites
      - sidebar
      - permalink
      - date
      - author
      - draft
    layout:
      allowed:
        - default
        - collection

  notes:
    path_pattern: "pages/_notes/**/*.md"
    required:
      - title
      - description
      - date
      - lastmod
      - layout
      - categories
      - tags
      - author
      - difficulty
      - permalink
    optional:
      - comments
      - draft
    layout:
      allowed:
        - note

  notebooks:
    path_pattern: "pages/_notebooks/**/*.md"
    required:
      - title
      - description
      - date
      - lastmod
      - layout
      - categories
      - tags
    optional:
      - comments
      - jupyter_metadata
      - collection
      - permalink
      - author
      - draft
    layout:
      allowed:
        - notebook

  quickstart:
    path_pattern: "pages/_quickstart/**/*.md"
    required:
      - title
      - description
      - layout
      - author
      - categories
      - tags
      - keywords
      - lastmod
    optional:
      - draft
      - sidebar
      - quickstart
      - permalink
      - preview
      - date
    layout:
      allowed:
        - default

  about:
    path_pattern: "pages/_about/**/*.md"
    required:
      - title
      - lastmod
    optional:
      - layout
      - description
      - date
      - categories
      - tags
      - draft
      - permalink
      - slug
      - order
      - sidebar
    layout:
      allowed:
        - default
        - root
        - stats
        - admin

  pages:
    path_pattern: "pages/*.md"
    required:
      - title
      - layout
      - description
      - lastmod
    optional:
      - date
      - categories
      - tags
      - permalink
      - subtitle
      - comments
      - toc
      - draft
    layout:
      allowed:
        - default
        - home
        - search
        - landing
        - collection
        - sitemap-collection
        - tag

  quests:
    path_pattern: "pages/_quests/**/*.md"
    required:
      - title
      - description
      - lastmod
      - layout
    optional:
      - categories
      - tags
      - permalink
      - date
      - author
      - draft
    layout:
      allowed:
        - default

  hobbies:
    path_pattern: "pages/_hobbies/**/*.md"
    required:
      - title
      - description
      - lastmod
      - layout
    optional:
      - categories
      - tags
      - permalink
      - date
      - author
      - draft
    layout:
      allowed:
        - default
