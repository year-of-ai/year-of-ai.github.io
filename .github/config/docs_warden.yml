# =============================================================================
# docs_warden.yml — the documentation coverage MAP (ADR-0005).
# =============================================================================
# The editable contract behind .github/workflows/docs-warden.yml + scripts/
# docs-warden.rb. It makes "every change is documented" enforceable: each
# code/config change-type maps to the doc(s) that must change with it, with an
# explicit exempt set for data/generated/bot commits so the autonomous loop is
# never nagged. Adding a new surface here is itself a doc-bearing change the
# warden checks — which is what keeps the map from rotting.
#
# Scope: the HUB's own doc surface only (member-repo CLAUDE.md is the separate
# claude-md-canon-warden). No overlap with ai-content-review (pages/** prose),
# framework-pr-reviewer (framework safety), or genome-sync (genome drift/leak).

# warn = always comment, never fail (rollout default).
# soft-gate = fail on a GATE-missing finding, dismissible via a `docs-exempt:`
#             line in the PR body or a `docs-warden:ack` label.
# hard-gate = fail on any GATE-missing finding, not dismissible.
enforcement: warn

# Doc-EXEMPT: changes here NEVER obligate a doc update. Decoupled from the genome
# `ignore` tier on purpose — being genome-ignored answers "does it transplant?",
# not "does it need a doc?". (CLAUDE.md/README/ADRs are genome-ignore yet ARE doc
# targets, so they are NOT here.) Evaluated BEFORE the unknown-surface fallthrough.
exempt_paths:
  - "_site/**"
  - ".git/**"
  - ".jekyll-*/**"
  - "vendor/**"
  - "node_modules/**"
  - ".claude/**"
  - "assets/**"
  - "_data/hub_index.yml"        # generated by hub-sync
  - "_data/lineage.yml"          # generated by sync-lineage-state
  - "_data/navigation/hub.yml"   # generated by hub-sync
  - "telemetry/*.jsonl"          # the evolution ledger (append-only growth data)
  - "Gemfile.lock"
  - "README.md"                  # hub instance readme — editorial, human PR
  - "CHANGELOG.md"               # hub instance history
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.ico"
  - "**/*.csv"

# Sweep mode: a commit by one of these authors whose message matches is generated
# growth/data and obligates NO docs (the grow tick git-adds the whole seed, so a
# section filter would flag every tick — exempt by committer + message instead).
bot_exempt_commits:
  - { author: "github-actions[bot]", message: '^chore\(lineage\): grow .+ — update seed Evolution Log$' }
  - { author: "github-actions[bot]", message: '^chore\(lineage\): refresh state ledger$' }
  - { author: "github-actions[bot]", message: '^chore\(hub\): refresh dashboard metadata' }
  - { author: "github-actions[bot]", message: '^chore\(telemetry\): record grow run' }
  - { author: "claude-grow",         message: '^content: growth tick' }
  - { author: "dependabot[bot]",     message: '.*' }

# CENSUS drift check (runs in gate + sweep): every plumbing file must be NAMED
# somewhere in the doc corpus, or it has drifted into being undocumented.
census:
  code_globs:
    - "scripts/**/*.rb"
    - "genome/bin/*.rb"
    - ".github/workflows/*.yml"
  doc_corpus:
    - "CLAUDE.md"
    - "genome/GENOME.md"
    - "lineage/README.md"
    - "telemetry/README.md"
    - "pages/orchestration.md"
    - "pages/self-improvement.md"
    - "lineage/decisions/*.md"
    - ".github/config/*.yml"
    - ".github/instructions/*.md"

# change → required-doc rules (PR diff coverage). `requires` = docs that should be
# touched in the SAME change. severity: gate (counts toward the check under
# soft/hard enforcement) | required (a finding, advisory under `warn`) | advisory.
rules:
  - id: workflows
    match: [".github/workflows/*.yml"]
    requires: ["CLAUDE.md"]
    severity: required
    note: "A new/changed workflow must appear in CLAUDE.md's repo-map; a fleet agent also needs an ADR-0003 + /self-improvement/ table row."
  - id: scripts
    match: ["scripts/**/*.rb", "scripts/**/*.sh"]
    requires: ["CLAUDE.md"]
    severity: required
    note: "Scripts are invisible plumbing — name them in CLAUDE.md (repo-map / Common commands)."
  - id: genome-bin
    match: ["genome/bin/*.rb"]
    requires: ["genome/GENOME.md"]
    severity: required
    note: "Name each genome engine in GENOME.md's plant/render/verify runbook."
  - id: policy-models
    match: ["lineage/policy.yml"]
    requires: ["pages/orchestration.md", "CLAUDE.md"]
    severity: gate
    note: "A model-tier/cadence/auth change must echo in the orchestration page + CLAUDE.md (a stale model ID breaks every tick)."
  - id: new-adr
    match: ["lineage/decisions/ADR-*.md"]
    requires: ["lineage/README.md"]
    severity: required
    note: "A new ADR must be linked from the decisions index (lineage/README.md)."
  - id: framework
    match: ["lineage/framework/**"]
    requires: ["lineage/README.md"]
    severity: advisory
    note: "Framework changes should update the inventory in lineage/README.md (safety is gated separately by framework-pr-reviewer)."
  - id: genome
    match: ["genome/manifest.yml", "genome/genome.yml", "genome/schema.json"]
    requires: ["genome/GENOME.md"]
    severity: advisory
    note: "Genome contract changes should echo in GENOME.md (structure/leak is gated by genome-sync)."
  - id: templates-chat-proxy
    match: ["templates/deploy/chat-proxy/**"]
    requires: ["templates/deploy/chat-proxy/README.md", "CLAUDE.md"]
    severity: required
    note: "The chat-proxy worker carries deploy blast-radius — document it + the Cloudflare secret contract."
  - id: configs-instructions
    match: [".github/config/*.yml", ".github/instructions/*.md", ".github/skills/**/SKILL.md"]
    requires: ["CLAUDE.md", ".github/instructions"]
    severity: advisory
    note: "A config/skill/instruction change should be mirrored in its paired instruction/config + CLAUDE.md."
