---
name: Lineage Orchestrator

# The hub is the central orchestrator for the org's self-growing knowledge bases.
# Once a day it:
#   1. READS each year's centralized seed (lineage/seeds/<year>.md) into
#      _data/lineage.yml via sync-lineage-state.rb, and commits any change
#      (which rebuilds the /lineage/ + /hub/ dashboards).
#   2. TRIGGERS one central growth tick per year repo by dispatching the hub's
#      grow-lineage.yml (-f repo=<year>) — which stages the framework + seed and
#      runs the 3-tier Haiku->Sonnet->Opus escalation against that repo.
#
# Each repo grows perpetually and is never consolidated, archived, or deleted.
#
# Secrets (org- or repo-level):
#   LIFECYCLE_PAT  — a PAT with `actions: write` on this hub, used to dispatch
#                    grow-lineage.yml. grow-lineage itself uses it to push content
#                    into each year repo. If unset, the ledger still refreshes
#                    (tracking-only).
#
# Deterministic: when no repo's state changed, the ledger is unchanged and no
# commit is made.

permissions:
  contents: write

on:
  schedule:
    - cron: '30 5 * * *' # daily, ahead of any residual per-repo automation
  workflow_dispatch:
    inputs:
      trigger_growth:
        description: 'Dispatch a grow tick to every repo (needs LIFECYCLE_PAT)'
        type: boolean
        default: true
      targets:
        description: 'Optional space-separated repo list (owner/name); blank = all in the ledger'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'scripts/sync-lineage-state.rb'
      - 'scripts/lib/hub.rb'
      - '.github/workflows/orchestrate.yml'
  pull_request:
    paths:
      - 'scripts/sync-lineage-state.rb'
      - '.github/workflows/orchestrate.yml'

concurrency:
  group: lineage-orchestrate
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Validate ledger (PRs)
        if: github.event_name == 'pull_request'
        run: ruby scripts/sync-lineage-state.rb --check

      - name: Refresh lineage ledger
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: ruby scripts/sync-lineage-state.rb

      - name: Commit refreshed ledger
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "$(git status --porcelain -- _data/lineage.yml)" ]; then
            echo "Lineage state unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/lineage.yml
          git commit -m "chore(lineage): refresh state ledger"
          git push

      - name: Trigger growth ticks
        # Schedule and manual dispatch (when trigger_growth is true) fan out a
        # grow tick to every repo in the ledger. Skipped gracefully if the PAT
        # is absent — the ledger refresh above still ran (tracking-only).
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.trigger_growth)
        env:
          GH_TOKEN: ${{ secrets.LIFECYCLE_PAT }}
          TARGETS: ${{ inputs.targets }}
        run: |
          # Global kill-switch (ADR-0003): halt all growth dispatch when paused.
          if ruby -ryaml -e 'exit(YAML.load_file("_data/fleet_pause.yml")["paused"] == true ? 0 : 1)' 2>/dev/null; then
            reason="$(ruby -ryaml -e 'puts YAML.load_file("_data/fleet_pause.yml")["reason"].to_s' 2>/dev/null)"
            echo "::notice::Fleet is PAUSED via _data/fleet_pause.yml — skipping all growth dispatch. ${reason:+Reason: $reason}"
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::LIFECYCLE_PAT not set — refreshed the ledger but did not trigger growth (tracking-only)."
            exit 0
          fi
          if [ -n "$TARGETS" ]; then
            repos="$TARGETS"
          else
            repos="$(ruby -ryaml -e "puts (YAML.load_file('_data/lineage.yml')['members'] || []).map { |m| m['repo'] }.join(' ')")"
          fi
          echo "Dispatching central grow ticks (grow-lineage.yml) for: $repos"
          for r in $repos; do
            name="${r##*/}"   # year-of-ai/1776 -> 1776
            if gh workflow run grow-lineage.yml -R year-of-ai/year-of-ai.github.io -f repo="$name" >/dev/null 2>&1; then
              echo "  ✓ $name"
            else
              echo "  ✗ $name (could not dispatch grow-lineage.yml; PAT needs actions:write on the hub)"
            fi
          done
