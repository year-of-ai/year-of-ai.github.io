name: Pages Deploy Sentinel

# Read-only post-publish liveness detector (ADR-0003 pages-deploy-sentinel, a P0
# monitor). The grow tick pushes content; this verifies the DOWNSTREAM result —
# that each member repo's GitHub Pages build succeeded AND its live site responds.
# It is the sole liveness signal a future rollback agent keys off. Read-only: it
# only edits ONE sticky tracking issue, never auto-remediates.
#
# A member serving HTTP 200 can still be STALE: if its latest Pages build
# errored (or has been stuck "building"), the site keeps serving the last good
# deploy — exactly what happened to 1777 (down 6 days behind a green sentinel)
# and 2008/2012 (platform-side deploy failures). So the build status check is
# authoritative, and an unreadable status is reported, never assumed healthy.
# Reading another repo's Pages builds needs a PAT — pass LIFECYCLE_PAT.

on:
  schedule:
    - cron: "13 * * * *" # hourly (off the :00 mark), decoupled from the growth cron
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: pages-deploy-sentinel
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Kill-switch
        id: pause
        run: |
          if ruby -ryaml -e 'exit(YAML.load_file("_data/fleet_pause.yml")["paused"] == true ? 0 : 1)' 2>/dev/null; then
            echo "::notice::Fleet paused — skipping pages-deploy-sentinel."; echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Check each member's Pages build + live site
        id: scan
        if: steps.pause.outputs.skip != 'true'
        env:
          # github.token cannot read other repos' Pages builds — that made the
          # build check silently inert. Fall back to it only if the PAT is absent
          # (the "unreadable" state below then reports the blindness honestly).
          GH_TOKEN: ${{ secrets.LIFECYCLE_PAT || github.token }}
        run: |
          set -uo pipefail
          # repo<TAB>site_url for every member in the lineage ledger.
          members="$(ruby -ryaml -e '
            d = YAML.load_file("_data/lineage.yml")
            org = d["org"]
            (d["members"] || []).each do |m|
              repo = m["repo"] || "#{org}/#{m["name"]}"
              site = m["site_url"] || "https://#{org.split("/").first}.github.io/#{m["name"]}/"
              puts "#{repo}\t#{site}"
            end' 2>/dev/null)"
          fails=""
          total=0; bad=0
          now_epoch=$(date -u +%s)
          while IFS=$'\t' read -r repo site; do
            [ -n "$repo" ] || continue
            total=$((total+1))
            build="$(gh api "repos/${repo}/pages/builds/latest" --jq '[.status, .created_at] | @tsv' 2>/dev/null || printf 'unreadable\t')"
            st="${build%%$'\t'*}"; created="${build#*$'\t'}"
            # A build stuck in "building" for over 90 minutes is a failed deploy
            # in practice (observed on 2012: stuck for hours after
            # "Deployment failed, try again later").
            if [ "$st" = "building" ] && [ -n "$created" ]; then
              created_epoch=$(date -u -d "$created" +%s 2>/dev/null || echo "$now_epoch")
              [ $((now_epoch - created_epoch)) -gt 5400 ] && st="stuck-building"
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' -L --max-time 25 "$site" 2>/dev/null || echo '000')"
            unhealthy=false
            case "$st" in
              errored|stuck-building|unreadable) unhealthy=true ;;
            esac
            if [ "$code" != "200" ] && [ "$code" != "304" ]; then unhealthy=true; fi
            if [ "$unhealthy" = "true" ]; then
              bad=$((bad+1))
              fails="${fails}| \`${repo##*/}\` | ${st} | ${code} | ${site} |"$'\n'
            fi
          done <<< "$members"
          echo "checked ${total} member(s), ${bad} unhealthy."
          {
            echo "## 🌐 Pages Deploy Sentinel"
            echo
            echo "_$(date -u '+%Y-%m-%d %H:%M UTC') · checked ${total} member site(s)._"
            echo
            if [ "$bad" -eq 0 ]; then
              echo "✅ All member Pages sites are built and live."
            else
              echo "**${bad} unhealthy site(s):**"
              echo
              echo "| Repo | Pages build | HTTP | URL |"
              echo "|---|---|---|---|"
              printf '%s' "$fails"
              echo
              echo "_Build states: \`errored\` = last build failed (site serves stale content);"
              echo "\`stuck-building\` = deploy hung >90 min (retry with \`gh api -X POST repos/<repo>/pages/builds\`);"
              echo "\`unreadable\` = the sentinel's token cannot read this repo's Pages builds (set LIFECYCLE_PAT)._"
            fi
          } > /tmp/sentinel.md
          cat /tmp/sentinel.md
          echo "bad=${bad}" >> "$GITHUB_OUTPUT"
      - name: File / update the liveness issue (only when unhealthy)
        if: steps.pause.outputs.skip != 'true' && steps.scan.outputs.bad != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Pages Deploy Sentinel — unhealthy member site(s)"
          body="$(cat /tmp/sentinel.md)"
          num="$(gh issue list --search "$title in:title" --state open --json number --jq '.[0].number' 2>/dev/null)"
          if [ -n "$num" ]; then
            gh issue edit "$num" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label monitoring 2>/dev/null \
              || gh issue create --title "$title" --body "$body"
          fi
      - name: Auto-close the liveness issue on recovery
        if: steps.pause.outputs.skip != 'true' && steps.scan.outputs.bad == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Pages Deploy Sentinel — unhealthy member site(s)"
          num="$(gh issue list --search "$title in:title" --state open --json number --jq '.[0].number' 2>/dev/null)"
          if [ -n "$num" ]; then
            gh issue close "$num" --comment "$(cat /tmp/sentinel.md)"$'\n\n'"All member sites are healthy again — auto-closing."
          fi
