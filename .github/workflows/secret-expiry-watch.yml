name: Secret Expiry Watch

# Read-only auth/credential-degradation monitor (ADR-0003 secret-expiry-watch, a
# P0 monitor). The whole machine hangs on three secrets; an expired
# CLAUDE_CODE_OAUTH_TOKEN once silently 401'd every tick. This probes them ONCE
# per day, AHEAD of the 05:30 growth window, so a dead credential is flagged
# before the day's runs burn on it. SINGLE-attempt probes (no retry loop — a retry
# could hammer the very endpoint that 401'd). Files/auto-closes ONE sticky issue.

on:
  schedule:
    - cron: "5 5 * * *" # 05:05 UTC — ahead of orchestrate's 05:30 dispatch
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  id-token: write # claude-code-action OIDC for the OAuth probe

concurrency:
  group: secret-expiry-watch
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Kill-switch
        id: pause
        run: |
          if ruby -ryaml -e 'exit(YAML.load_file("_data/fleet_pause.yml")["paused"] == true ? 0 : 1)' 2>/dev/null; then
            echo "::notice::Fleet paused — skipping secret-expiry-watch."; echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Probe LIFECYCLE_PAT (single attempt, read-only)
        id: pat
        if: steps.pause.outputs.skip != 'true'
        env:
          PAT: ${{ secrets.LIFECYCLE_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "state=unset" >> "$GITHUB_OUTPUT"
          elif GH_TOKEN="$PAT" gh api "repos/${{ github.repository }}" --jq '.full_name' >/dev/null 2>&1; then
            echo "state=ok" >> "$GITHUB_OUTPUT"
          else
            echo "state=degraded" >> "$GITHUB_OUTPUT"
          fi

      - name: Probe CLAUDE_CODE_OAUTH_TOKEN (1-turn Haiku, single attempt)
        id: oauth
        if: steps.pause.outputs.skip != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Reply with the single word OK and nothing else."
          claude_args: "--model claude-haiku-4-5 --max-turns 1"
          show_full_output: true

      - name: Evaluate + file/close the auth issue
        if: steps.pause.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # OAuth health from the action's result element (is_error true = auth failed).
          oauth="ok"
          out=/home/runner/work/_temp/claude-execution-output.json
          if [ ! -f "$out" ]; then
            oauth="degraded"   # action produced nothing — treat as failure
          elif jq -e '[.[] | select(.type=="result")] | last | .is_error == true' "$out" >/dev/null 2>&1; then
            oauth="degraded"
          fi
          pat="${{ steps.pat.outputs.state }}"
          echo "LIFECYCLE_PAT: $pat | CLAUDE_CODE_OAUTH_TOKEN: $oauth"

          bad=""
          [ "$pat" != "ok" ] && bad="${bad}- **LIFECYCLE_PAT**: ${pat} — regenerate a PAT with repo + actions:write and update the org secret."$'\n'
          [ "$oauth" != "ok" ] && bad="${bad}- **CLAUDE_CODE_OAUTH_TOKEN**: ${oauth} — run \`claude setup-token\` and update the org secret (growth + the API-key fallback depend on it)."$'\n'

          title="Secret Expiry Watch — credential degraded"
          num="$(gh issue list --search "$title in:title" --state open --json number --jq '.[0].number' 2>/dev/null)"
          if [ -n "$bad" ]; then
            printf '## 🔐 Secret Expiry Watch — credential degraded\n_%s_\n\n%s\nFlagged BEFORE the 05:30 growth window so it does not burn on a dead credential.\n' \
              "$(date -u '+%Y-%m-%d %H:%M UTC')" "$bad" > /tmp/auth.md
            if [ -n "$num" ]; then gh issue edit "$num" --body-file /tmp/auth.md; else
              gh issue create --title "$title" --body-file /tmp/auth.md --label monitoring 2>/dev/null || gh issue create --title "$title" --body-file /tmp/auth.md
            fi
            echo "::warning::Auth degraded — see issue."
          else
            echo "✅ All credentials healthy."
            if [ -n "$num" ]; then
              gh issue close "$num" --comment "✅ Credentials healthy again as of $(date -u '+%Y-%m-%d %H:%M UTC') — auto-closed by secret-expiry-watch." 2>/dev/null || true
            fi
          fi
