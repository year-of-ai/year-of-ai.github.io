---
name: Telemetry Ledger

# The keystone of the self-improvement fleet (ADR-0003 telemetry-ledger-collector)
# and the fix for the "no evolution ledger" defect: grow-lineage uploads a 14-day
# per-run telemetry artifact that is otherwise discarded. This collector runs after
# every Grow Lineage run, reads that artifact, and APPENDS one evolution-telemetry/v1
# record to the hub's telemetry/evolution.jsonl — the single append-only ledger every
# learn/cost/monitor agent will read.
#
# Append-only + idempotent on run_id. Records ALSO the framework SHA the tick ran
# under (workflow_run.head_sha) so a future learn agent can quarantine windows by
# framework version. The CORRECTED trigger ("Grow Lineage") + artifact pattern
# (grow-lineage-telemetry-*) — the dormant lineage/framework/workflows/telemetry.yml
# had both wrong.

on:
  workflow_run:
    workflows: ["Grow Lineage"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write   # commit the ledger
  actions: read     # download the triggering run's artifact

concurrency:
  group: telemetry-ledger-append   # serialize appends so the ledger never races
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # Only for real Grow Lineage runs (workflow_dispatch has no workflow_run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.name == 'Grow Lineage' }}
    steps:
      - name: Checkout the hub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LIFECYCLE_PAT || github.token }}

      - name: Download the triggering run's telemetry artifact
        if: github.event_name == 'workflow_run'
        continue-on-error: true   # a tick that produced no output uploads no artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: grow-lineage-telemetry-*
          path: /tmp/tel

      - name: Append the evolution record
        if: github.event_name == 'workflow_run'
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          STARTED: ${{ github.event.workflow_run.created_at }}
          ENDED: ${{ github.event.workflow_run.updated_at }}
          GH_TOKEN: ${{ secrets.LIFECYCLE_PAT || github.token }}
        run: |
          set -uo pipefail
          mkdir -p telemetry
          touch telemetry/evolution.jsonl

          # Idempotent: never double-record a run.
          if grep -q "\"run_id\":\"${RUN_ID}\"" telemetry/evolution.jsonl; then
            echo "run ${RUN_ID} already in the ledger — nothing to do."
            exit 0
          fi

          # The artifact (if any) unzips to /tmp/tel/grow-lineage-telemetry-<repo>-<run_id>/.
          dir="$(find /tmp/tel -maxdepth 1 -type d -name 'grow-lineage-telemetry-*' 2>/dev/null | head -1)"
          repo="" json="" is_error="null" turns="0" in_tok="0" out_tok="0" cost="0"
          if [ -n "$dir" ]; then
            base="$(basename "$dir")"; name="${base#grow-lineage-telemetry-}"
            repo="${name%-*}"                      # strip the trailing -<run_id>
            json="$dir/claude-execution-output.json"
          fi
          if [ -n "$json" ] && [ -f "$json" ]; then
            r() { jq -r "[.[]|select(.type==\"result\")]|last|$1 // \"\"" "$json" 2>/dev/null; }
            is_error="$(r '.is_error')"; [ -z "$is_error" ] && is_error="null"
            turns="$(r '.num_turns')";   [ -z "$turns" ] && turns="0"
            in_tok="$(r '.usage.input_tokens')";  [ -z "$in_tok" ] && in_tok="0"
            out_tok="$(r '.usage.output_tokens')"; [ -z "$out_tok" ] && out_tok="0"
            cost="$(r '.total_cost_usd')"; [ -z "$cost" ] && cost="0"
          fi

          rec="$(jq -nc \
            --arg run "$RUN_ID" --arg repo "$repo" --arg conc "$CONCLUSION" \
            --arg sha "$HEAD_SHA" --arg started "$STARTED" --arg ended "$ENDED" \
            --argjson err "${is_error:-null}" --argjson turns "${turns:-0}" \
            --argjson it "${in_tok:-0}" --argjson ot "${out_tok:-0}" --argjson cost "${cost:-0}" \
            '{schema:"evolution-telemetry/v1", run_id:$run, repo:$repo, conclusion:$conc,
              is_error:$err, num_turns:$turns, input_tokens:$it, output_tokens:$ot,
              cost_usd:$cost, framework_sha:$sha, started:$started, ended:$ended}')"
          if [ -z "$rec" ]; then echo "::warning::could not build telemetry record"; exit 0; fi
          printf '%s\n' "$rec" >> telemetry/evolution.jsonl
          echo "appended: $rec"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add telemetry/evolution.jsonl
          git commit -q -m "chore(telemetry): record grow run ${RUN_ID} (${repo:-?}, ${CONCLUSION})"
          for _ in 1 2 3 4 5; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main || true
          done
          echo "::warning::could not push the telemetry ledger update after retries"
