# =============================================================================
# genome.example.ai-world-view.yml — the live instance manifest for the
# ai-world-view org (planted from the organizational genome, ADR-0004).
# =============================================================================
# Concept: the world, one country at a time — the geographic mirror of year-of-ai
# (one year at a time). The entire model transplants; only this manifest changes.

genome_version: "0.1.0"

identity:
  org: "ai-world-view"
  hub_repo: "ai-world-view.github.io"
  hub_domain: "ai-world-view.github.io"
  git_author_email: "noreply@anthropic.com"
  theme_repo: "bamr87/zer0-mistakes"

branding:
  site_title: "AI World View"
  site_tagline: "A federated, self-growing knowledge base of the world — one country at a time."
  founder_name: "Amr Abdel-Motaleb"
  founder_email: "amr.abdel@gmail.com"
  author_bio: "Mapping the world's knowledge, one country at a time"
  author_location: "Denver, CO"
  copyright_year: 2026
  preview_image_style: "flat vector world-map cartography, muted earth tones"
  preview_provider: "openai"
  preview_model: "gpt-image-2"
  chat_assistant_name: "Atlas"
  chat_system_prompt: "You are Atlas, a helpful assistant for the AI World View knowledge base of the world's countries."

analytics: { google_analytics: "", posthog_api_key: "", posthog_host: "" }
social:    { twitter: "", instagram: "", youtube_url: "" }
comments:  { giscus_repo_id: "", giscus_category_id: "" }

lexicon:
  unit_noun: "country"
  unit_noun_plural: "countries"
  unit_icon: "bi-globe"
  subject_singular: "the country"
  member_subject_template: "the country {member}"
  knowledge_table_heading: "Notable Facts about {{SUBJECT}}"

taxonomy:
  taxonomy_strategy: "enumerable"
  default_taxonomy:
    - { name: "Geography",             slug: "geography" }
    - { name: "History",               slug: "history" }
    - { name: "Government & Politics",  slug: "government-politics" }
    - { name: "Economy",               slug: "economy" }
    - { name: "Culture & Society",     slug: "culture-society" }
    - { name: "People",                slug: "people" }

lifecycle:
  first_member: "japan"
  member_slug_rule: "Lowercase the country's common English name; hyphenate spaces (e.g. 'south-korea')."
  succession_rule: "Pick the next country tangential to the frontier (shared region, trade bloc, or history) — no linear order; the hub chooses."
  consolidation_naming_rule: "Hyphenate the region (e.g. 'east-asia')."
  deepen_granularity: "administrative region, then city"

cadence:
  cron: "30 5 * * *"
  replant_after_ticks: 3
  consolidate_at_members: 7
