# Growth tick — the heartbeat of the self-growing knowledge base.
#
# A tick is a 3-TIER content escalation (the model for each tier is read from
# lifecycle.yml -> policy.models):
#   1. generate (claude-haiku-4-5)  — plan + research + DRAFT new topic files
#   2. expand   (claude-sonnet-4-6) — deepen every draft (detail, sources, links)
#   3. enhance  (claude-opus-4-8)   — polish, build indices, sync/encode seed, publish
# The three passes share the runner's working tree, so drafts persist between them.
# A mature repo's tick shepherds the newest growing member (the passes operate on
# the cloned member). `distill` (the one-time lineage meta-review) stays a single
# pass on the frontier model. The same workflow file is planted into every repo;
# the hub (year-of-ai/year-of-ai.github.io) is the sole scheduler and dispatches it.
#
# Required repository/org secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  — Claude subscription OAuth token (generate with
#                              `claude setup-token`). PRIMARY auth for every pass.
#   LIFECYCLE_PAT            — PAT with contents:write + repo-creation/archive rights
#                              on the owner org. Needed for shepherd/cross-repo work.
#   ANTHROPIC_API_KEY        — fallback auth: used only if the OAuth passes leave the
#                              tick unpublished (e.g. the subscription token expired).
#
# Model policy lives in lifecycle.yml -> policy.models.{generate,expand,enhance,distill}.

name: grow

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Optional /grow arguments (item count or targets)"
        required: false
        default: ""

# Never let two ticks overlap.
concurrency:
  group: lifecycle-tick
  cancel-in-progress: false

env:
  # ---- Tier 1: generate (drafts only) ------------------------------------
  GENERATE_PROMPT: |
    You are the GENERATE pass (tier 1 of 3: generate -> expand -> enhance) of one
    growth tick of this self-growing knowledge base. Your job is to produce DRAFT
    content only. Do NOT build indices, run sync-seed/encode-seed, or publish —
    later passes do that. Leave your work uncommitted in the working tree.

    1. If seed.md is missing or has no Concept Definition, this is a freshly planted
       successor: run /genesis to bootstrap the repo (draft seed.md, README, and the
       initial category structure) and stop.
    2. Otherwise run the check-lifecycle skill and act on its decision:
       - grow -> run plan-roadmap to select 1-3 topics NOT already covered (read
         README.md and existing category files first; never re-add an existing
         topic), then use add-topic / deep-dive to RESEARCH and WRITE a first draft
         of each selected file. ${{ inputs.args }}
       - dormant (shepherd) -> this repo is mature; the target is the newest lineage
         member whose status is `growing`. Read lifecycle.yml to find it, clone it
         with git clone "https://x-access-token:${LIFECYCLE_PAT}@github.com/<owner>/<repo>.git",
         cd into the clone, and do the SAME generate work there (plan + draft new
         files). Leave everything uncommitted; the later passes will find the clone.
       - replant / consolidate / expand -> not expected under the current perpetual
         policy. If one fires, perform only its minimal structural step and stop;
         the enhance pass will publish.
    A generate pass that writes NO new draft content has FAILED — planning alone is
    not progress. Stop once the drafts exist; do not publish.

  # ---- Tier 2: expand (deepen the drafts) --------------------------------
  EXPAND_PROMPT: |
    You are the EXPAND pass (tier 2 of 3) of an in-progress growth tick. The
    generate pass left uncommitted draft files in the working tree — in THIS repo,
    or inside a cloned lineage-member directory if this is a shepherd tick. Locate
    the new/modified files (run `git status` here; if clean, look for a cloned repo
    directory and check `git status` inside it).

    For every new or modified draft, DEEPEN and EXPAND it: add detail and sub-sections,
    specific dates and figures, at least two sourced facts, and cross-links to sibling
    topics. Improve structure and completeness. Do NOT build indices, run
    sync-seed/encode-seed, or publish — the enhance pass does that. If there is
    nothing uncommitted to expand, stop without changes.

  # ---- Tier 3: enhance (polish + publish) --------------------------------
  ENHANCE_PROMPT: |
    You are the ENHANCE pass (tier 3 of 3) of an in-progress growth tick. Finish and
    PUBLISH it. The expand pass left deepened drafts uncommitted — in THIS repo, or in
    a cloned lineage-member directory for a shepherd tick (locate it as the expand pass
    did). Work in whichever repo holds the new content, in this order — do not end your
    turn until the last step has pushed:
      1. Enhance — polish prose, verify facts and sources, fix cross-references, ensure
         an encyclopedic neutral tone and correct front matter on every new file.
      2. build-structure — refresh indices, TIMELINE, INDEX, and cross-refs.
      3. sync-seed — regenerate seed sections 1-7.
      4. encode-seed — append a section 8 Evolution Log entry titled "Tick N:" naming
         what was added (this is the clock check-lifecycle counts).
      5. publish-session — commit and push to main.
    If a shepherd tick changed framework files in the member, run the POLLINATE skill to
    open one back-merge PR. If the working tree is clean (no drafts to finish), stop.
    The tick is complete only after publish-session has pushed.

  # ---- distill / API-key fallback: one complete pass ---------------------
  TICK_PROMPT: |
    Run one complete lifecycle-gated tick of this self-growing knowledge base.
    0. If PHASE is "distill", run /distill — the lineage meta-review on the frontier
       model (review all members, improve the cycle, write the seed-package/ bootstrap
       kit) — publish, and stop.
    1. If seed.md is missing or has no Concept Definition, run /genesis and stop after
       publishing.
    2. Otherwise run the check-lifecycle skill and follow its decision: grow -> run a
       COMPLETE /grow ${{ inputs.args }} (plan-roadmap, then add-topic/deep-dive to
       research and WRITE files, build-structure, sync-seed, encode-seed,
       publish-session — do not stop until publish-session has pushed); dormant ->
       shepherd the newest growing member (clone it, run this procedure there,
       publish); replant/consolidate/expand -> run the matching command and publish.
    The ambient GitHub token is scoped to this repo only; for cross-repo work use
    GH_TOKEN="$LIFECYCLE_PAT" / the x-access-token remote.

jobs:
  tick:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write # claude-code-action exchanges an OIDC token for its GitHub token
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LIFECYCLE_PAT || github.token }}

      # Resolve the phase and the per-tier models from lifecycle policy. distill is
      # a one-time meta-review gated on distill_at_members + null distilled_at in the
      # canonical driver (lineage[0]); everything else is a content "tick" and runs
      # the 3-tier generate -> expand -> enhance escalation.
      - name: Resolve phase and models from lifecycle policy
        id: model
        run: |
          read_model() { grep -E "^[[:space:]]*$1:" lifecycle.yml | head -1 | sed -E "s/.*$1:[[:space:]]*\"?([^\"#]+)\"?.*/\1/" | xargs; }
          generate_model=$(read_model generate)
          expand_model=$(read_model expand)
          enhance_model=$(read_model enhance)
          distill_model=$(read_model distill)
          threshold=$(grep -E '^[[:space:]]*distill_at_members:' lifecycle.yml | head -1 | grep -oE '[0-9]+' || true)
          members=$(grep -cE '^[[:space:]]*- subject:' lifecycle.yml || true)
          pending=$(grep -E '^[[:space:]]*distilled_at:' lifecycle.yml | head -1 | grep -c null || true)
          driver_repo=$(awk '/^[[:space:]]*lineage:/{f=1} f&&/repo:/{sub(/.*repo:[[:space:]]*"?/,""); sub(/"?[[:space:]]*$/,""); print; exit}' lifecycle.yml)
          is_driver=1
          if [ -n "$driver_repo" ] && [ -n "${GITHUB_REPOSITORY:-}" ] && [ "$driver_repo" != "$GITHUB_REPOSITORY" ]; then
            is_driver=0
          fi
          phase=tick
          if [ "${members:-0}" -ge "${threshold:-999}" ] && [ "${pending:-0}" -eq 1 ] && [ "$is_driver" -eq 1 ]; then
            phase=distill
          fi
          {
            echo "phase=$phase"
            echo "generate_model=${generate_model:-claude-haiku-4-5}"
            echo "expand_model=${expand_model:-claude-sonnet-4-6}"
            echo "enhance_model=${enhance_model:-claude-opus-4-8}"
            echo "distill_model=${distill_model:-claude-opus-4-8}"
          } >> "$GITHUB_OUTPUT"
          echo "Phase: $phase — generate=${generate_model:-claude-haiku-4-5} expand=${expand_model:-claude-sonnet-4-6} enhance=${enhance_model:-claude-opus-4-8} (members=${members:-0}, driver=${driver_repo:-unset}, is_driver=$is_driver)"

      # Deterministic lineage maintenance — forward-pollinate the canonical framework
      # into drifted members and reconcile the registry, BEFORE the model passes, so
      # the agents are spent only on content. Idempotent; self-guards on LIFECYCLE_PAT.
      - name: Lineage maintenance (deterministic — pollinate forward + reconcile registry)
        continue-on-error: true
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
        run: bash .github/scripts/lineage.sh

      # ===== distill path (single pass on the frontier model) ================
      - name: Distill (lineage meta-review)
        if: steps.model.outputs.phase == 'distill'
        id: distill
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
          PHASE: distill
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ env.TICK_PROMPT }}
          claude_args: >-
            --model ${{ steps.model.outputs.distill_model }}
            --max-turns 150
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,Skill"
          show_full_output: true

      # ===== tick path: 3-tier escalation ====================================
      - name: Tier 1 — generate drafts (Haiku)
        if: steps.model.outputs.phase == 'tick'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
          PHASE: generate
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ env.GENERATE_PROMPT }}
          claude_args: >-
            --model ${{ steps.model.outputs.generate_model }}
            --max-turns 80
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,Skill"
          show_full_output: true

      - name: Tier 2 — expand drafts (Sonnet)
        if: steps.model.outputs.phase == 'tick'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
          PHASE: expand
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ env.EXPAND_PROMPT }}
          claude_args: >-
            --model ${{ steps.model.outputs.expand_model }}
            --max-turns 80
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,Skill"
          show_full_output: true

      - name: Tier 3 — enhance and publish (Opus)
        if: steps.model.outputs.phase == 'tick'
        id: enhance
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
          PHASE: enhance
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ env.ENHANCE_PROMPT }}
          claude_args: >-
            --model ${{ steps.model.outputs.enhance_model }}
            --max-turns 120
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,Skill"
          show_full_output: true

      # API-key fallback: if the OAuth passes left the tick unpublished (tree dirty)
      # or never produced anything, run one complete tick on the API key. Ticks are
      # gated and republish-safe, so a second attempt cannot double-apply.
      - name: Detect unfinished tick
        if: always()
        id: unfinished
        run: |
          dirty=false
          [ -n "$(git status --porcelain)" ] && dirty=true
          # claude-code-action exits 0 even when the agent result is an error
          # (e.g. an invalid/expired OAuth token): the final result element carries
          # is_error:true. Detect it so the API-key fallback fires even when the
          # OAuth passes produced nothing (clean tree, but auth failed).
          failed=false
          out=/home/runner/work/_temp/claude-execution-output.json
          if [ -f "$out" ] && jq -e '[.[] | select(.type=="result")] | last | .is_error == true' "$out" >/dev/null 2>&1; then
            failed=true
          fi
          echo "dirty=$dirty" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Fallback — complete the tick on the API key
        if: steps.model.outputs.phase == 'tick' && (steps.unfinished.outputs.dirty == 'true' || steps.unfinished.outputs.failed == 'true')
        uses: anthropics/claude-code-action@v1
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
          PHASE: enhance
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.TICK_PROMPT }}
          claude_args: >-
            --model ${{ steps.model.outputs.enhance_model }}
            --max-turns 150
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,TodoWrite,Task,Skill"
          show_full_output: true

      - name: Upload agent telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-telemetry-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 14

      # Publish safety net. If the enhance pass produced content but ended before
      # publish-session, commit and push what it left so a tick is never silently
      # lost. A clean tree makes this a no-op.
      - name: Publish safety net (push any unpublished tick output)
        if: always()
        env:
          LIFECYCLE_PAT: ${{ secrets.LIFECYCLE_PAT }}
        run: |
          set -uo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "Working tree clean — nothing to publish."
            exit 0
          fi
          echo "::warning::Uncommitted changes after the tick — publishing via safety net."
          # Append a minimal §8 Evolution Log entry titled "Tick N:" so the lifecycle
          # clock advances even when encode-seed was not reached.
          if [ -f seed.md ] && grep -qE '^### G[0-9]+-T[0-9]+' seed.md; then
            last=$(grep -oE '^### G[0-9]+-T[0-9]+' seed.md | tail -1)
            gen=$(printf '%s' "$last" | sed -E 's/^### G([0-9]+)-T([0-9]+)/\1/')
            seq=$(printf '%s' "$last" | sed -E 's/^### G([0-9]+)-T([0-9]+)/\2/')
            bnd=$(grep -nE '^### G[0-9]+-T[0-9]+ .*(Genesis|Replant)' seed.md | tail -1 | cut -d: -f1)
            n=$(tail -n +"${bnd:-1}" seed.md | grep -cE '— Tick [0-9]+:')
            printf '\n### G%s-T%s — %s — Tick %s: growth tick (published by safety net)\n**Action**: Content published by the workflow safety net; the enhance pass ended before publish-session.\n**Outcome**: Committed here; titled "Tick N" so check-lifecycle counts it.\n' \
              "$gen" "$((seq+1))" "$(date -u +%Y-%m-%d)" "$((n+1))" >> seed.md
          fi
          git config user.name "claude-grow"
          git config user.email "noreply@anthropic.com"
          git add -A
          git commit -m "chore: publish tick output (safety net — publish-session not reached)"
          # claude-code-action leaves a stale http.extraheader in .git/config that
          # overrides other auth and fails push; strip it, then push with the PAT.
          { git config --local --get-regexp 'http\..*\.extraheader' 2>/dev/null || true; } \
            | awk '{print $1}' | while read -r k; do git config --local --unset-all "$k" || true; done
          git remote set-url origin "https://x-access-token:${LIFECYCLE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          for _ in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
