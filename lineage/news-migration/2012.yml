# News-layout enrichment for year-of-ai/2012
# Sections in canonical order; tags are section-scoped filter pills.

site:
  title: "The Year 2012"
  tagline: "The year the world watched London's Games, confirmed the Higgs boson, and rode a viral wave."

sections:
  history-politics:
    name: "History & Politics"
    icon: "bi-bank"
    description: "London staged a record Summer Olympics and Paralympics while a US presidential election, the Diamond Jubilee, and East Asian and Middle Eastern flashpoints defined the political year."
    featured: "london-2012-olympics"
  science-technology:
    name: "Science & Technology"
    icon: "bi-cpu"
    description: "Physicists confirmed the Higgs boson and Curiosity reached Mars in a year that also brought the iPhone 5, Windows 8, record Arctic ice loss, and the SOPA/PIPA internet revolt."
    featured: "higgs-boson-discovery"
  arts-culture:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "Gangnam Style became the first video to pass a billion YouTube views alongside blockbuster franchises Skyfall, The Avengers, and The Dark Knight Rises, Adele's chart reign, and the Pussy Riot trial."
    featured: "gangnam-style-viral-phenomenon"
  society-economics:
    name: "Society & Economics"
    icon: "bi-globe2"
    description: "Hurricane Sandy and the Sandy Hook shooting shook the United States while the eurozone debt crisis, Facebook's IPO, Occupy Wall Street, and the KONY 2012 campaign dominated headlines."
    featured: "hurricane-sandy-2012"
  people:
    name: "People"
    icon: "bi-person-badge"
    description: "Leaders took office or won re-election across the US, Russia, China, Egypt, and North Korea as Malala Yousafzai's shooting turned a Pakistani schoolgirl into a global icon for education."
    featured: "malala-yousafzai-2012-shooting"

