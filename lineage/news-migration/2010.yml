site:
  title: "The Year 2010"
  tagline: "Front-page dispatches from 2010 — earthquakes and oil spills, iPads and uprisings, the year the 2010s began."
sections:
  history-politics:
    name: "History & Politics"
    icon: "bi-bank"
    description: "Earthquakes, floods, and the Deepwater Horizon oil spill shared 2010's front pages with hung parliaments, the first stirrings of the Arab Spring, and a World Cup on African soil."
    featured: "deepwater-horizon-oil-spill"
  science-technology:
    name: "Science & Technology"
    icon: "bi-cpu"
    description: "A landmark year for discovery: the first self-replicating synthetic cell, graphene's Nobel, the LHC's first 7 TeV collisions, the world's tallest building, and the launch of the iPad, iPhone 4, Kinect, and Instagram."
    featured: "ipad-launch"
  arts-culture:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "A box-office and 3D boom led by Avatar, Inception, and Toy Story 3, alongside prestige dramas like The King's Speech and The Social Network and a late-night television upheaval."
    featured: "inception"
  society-economics:
    name: "Society & Economics"
    icon: "bi-globe2"
    description: "Sweeping US legislation in the Affordable Care Act and Dodd-Frank met the eurozone's first bailout, a jobless global recovery, the decennial census, Shanghai's record Expo, and Twitter's rise."
    featured: "affordable-care-act"
  people:
    name: "People"
    icon: "bi-person-badge"
    description: "The figures who defined 2010, from dissidents and Nobel laureates like Liu Xiaobo and Aung San Suu Kyi to WikiLeaks' Julian Assange, Arab Spring catalyst Mohamed Bouazizi, and sporting icons LeBron James and Lionel Messi."
    featured: "julian-assange"
