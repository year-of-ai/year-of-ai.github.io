# Enrichment map for the 1778 news-structure migration.
# Hand-authored: coherent per-section topic (tag) vocabularies + a marquee
# "featured" article per section. Excerpts are derived mechanically by the
# migration script from each article's ## Summary paragraph.
#
# `sections` order here is the order used in the News nav + /news/ landing.

site:
  title: "The Year 1778"
  tagline: "Dispatches from the year the American Revolution became a global war."

sections:
  politics:
    name: "Political Events"
    icon: "bi-bank"
    description: "How the Franco-American alliance of February 6, 1778 turned a colonial rebellion into a global war and reshaped diplomacy across Europe and America."
    featured: "franco-american-alliance"
  military:
    name: "Military Events"
    icon: "bi-shield"
    description: "The land and naval campaigns of 1778, from Valley Forge and Monmouth to the first Franco-British fleet actions at Ushant and St. Lucia."
    featured: "valley-forge-encampment"
  science:
    name: "Science & Discovery"
    icon: "bi-lightbulb"
    description: "The discoveries and expeditions of 1778, spanning Cook's Pacific voyage, the death of Linnaeus, and advances in astronomy and precision instruments."
    featured: "captain-cook-hawaii"
  arts:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "The cultural year of 1778, from the deaths of Voltaire and Rousseau to the opera rivalries of Paris and the opening of La Scala."
    featured: "enlightenment-transition-1778"
  economics:
    name: "Economics & Trade"
    icon: "bi-coin"
    description: "The wartime economy of 1778, marked by the collapse of the Continental dollar, French war financing, privateering, and early industrialization."
    featured: "continental-dollar-crisis"
  people:
    name: "Key Figures"
    icon: "bi-person-badge"
    description: "The key figures of 1778 — revolutionary leaders, French allies, Enlightenment philosophers, and the statesmen who died that year."
    featured: "george-washington"

# Per-article topic tags. Key = "<section-slug>/<article-slug>".
# Tags are lowercase, human-readable, and deliberately REUSED across a section
# so each becomes a real sub-grouping (the collapsible sidebar / filter pills).
