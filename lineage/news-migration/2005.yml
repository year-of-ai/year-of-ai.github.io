# Enrichment map for the 2005 news-structure migration (pilot input).
# Hand-authored: coherent per-section topic (tag) vocabularies + a marquee
# "featured" article per section. Excerpts are derived mechanically by the
# migration script from each article's ## Summary paragraph.
#
# `sections` order here is the order used in the News nav + /news/ landing.

site:
  title: "The Year 2005"
  tagline: "A self-growing newsroom for the year 2005 — history, science, culture, society, and people."

sections:
  history-politics:
    name: "History & Politics"
    icon: "bi-bank"
    description: "Elections, conflicts, diplomacy, and the political turning points of 2005."
    featured: "77-london-bombings"
  science-technology:
    name: "Science & Technology"
    icon: "bi-cpu"
    description: "Space missions, medical firsts, new hardware, and the founding of YouTube."
    featured: "youtube-founded"
  arts-culture:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "The films, music, and television that defined 2005's cultural landscape."
    featured: "star-wars-episode-iii"
  society-economics:
    name: "Society & Economics"
    icon: "bi-globe2"
    description: "Disasters, public health, law, and the social and economic forces of 2005."
    featured: "hurricane-katrina"
  people:
    name: "People"
    icon: "bi-person-badge"
    description: "The individuals whose lives and milestones shaped 2005."
    featured: "rosa-parks-dies"

# Per-article topic tags. Key = "<section-slug>/<article-slug>".
# Tags are lowercase, human-readable, and deliberately REUSED across a section
# so each becomes a real sub-grouping (the collapsible sidebar / filter pills).
tags:
  history-politics/iraqi-elections-2005: ["elections", "middle east"]
