site:
  title: "The Year 2007"
  tagline: "Dispatches from the year the iPhone arrived and the credit markets began to crack."
sections:
  history-politics:
    name: "History & Politics"
    icon: "bi-bank"
    description: "The wars, elections, and assassinations that reshaped world politics in 2007, from the Iraq troop surge to the killing of Benazir Bhutto."
    featured: "iraq-war-troop-surge"
  science-technology:
    name: "Science & Technology"
    icon: "bi-cpu"
    description: "The breakthroughs of 2007, from Apple's iPhone and Amazon's Kindle to induced pluripotent stem cells and record Arctic sea-ice loss."
    featured: "iphone-launch"
  arts-culture:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "The books, films, concerts, and media controversies that defined popular culture in 2007, led by the final Harry Potter novel."
    featured: "harry-potter-deathly-hallows"
  society-economics:
    name: "Society & Economics"
    icon: "bi-globe2"
    description: "The financial and energy stories of 2007, as the subprime mortgage crisis broke, markets peaked, and oil neared $100 a barrel."
    featured: "subprime-mortgage-crisis"
  people:
    name: "People"
    icon: "bi-person-badge"
    description: "The public figures who died, triumphed, or dominated the headlines in 2007, from Pavarotti and Vonnegut to Barry Bonds and Paris Hilton."
    featured: "paris-hilton-jail-2007"
