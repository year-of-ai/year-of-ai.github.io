site:
  title: "The Year 1777"
  tagline: "Revolution, empire, and Enlightenment — dispatches from the world as it turned in 1777."
sections:
  politics:
    name: "Political Events"
    icon: "bi-bank"
    description: "National founding milestones in Revolutionary America alongside the dynastic diplomacy and balance-of-power struggles of Europe's great courts in 1777."
    featured: "articles-of-confederation"
  military:
    name: "Military Events"
    icon: "bi-shield"
    description: "Battles, campaigns, and winter encampments of the American Revolutionary War in 1777, from Brandywine and Philadelphia to the decisive turn at Saratoga."
    featured: "battles-of-saratoga"
  science:
    name: "Science & Discovery"
    icon: "bi-lightbulb"
    description: "Enlightenment breakthroughs across chemistry, astronomy, physics, and medicine as natural philosophy reshaped the sciences in 1777."
    featured: "lavoisier-oxygen-theory"
  arts:
    name: "Arts & Culture"
    icon: "bi-palette"
    description: "Landmark operas, plays, and musical milestones that premiered across the theatres and courts of Europe in 1777."
    featured: "beaumarchais-marriage-of-figaro"
  economics:
    name: "Economics & Trade"
    icon: "bi-coin"
    description: "The economics of empire and revolution in 1777, from Adam Smith's market theory and Watt's steam engine to privateering, war finance, and colonial trade reform."
    featured: "adam-smith-wealth-of-nations"
  people:
    name: "Key Figures"
    icon: "bi-person-badge"
    description: "The commanders, statesmen, diplomats, and thinkers who shaped 1777 — from Washington's Continental Army and Britain's high command to the mathematicians and writers of the wider world."
    featured: "george-washington"
