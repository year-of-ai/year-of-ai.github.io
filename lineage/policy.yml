# =============================================================================
# Canonical growth policy for the year-of-ai lineage.
# =============================================================================
# The hub (year-of-ai/year-of-ai.github.io) orchestrates growth CENTRALLY: it
# pulls each year's seed from lineage/seeds/<year>.md, clones the year repo,
# runs the 3-tier content escalation, and pushes the new content back. Each
# year repo holds only content + a GitHub Pages _config.yml + .claude/ +
# telemetry/.
#
# Read by: .github/workflows/orchestrate.yml (cadence) and
# .github/workflows/grow-lineage.yml (model tiers).

# 3-tier content escalation — the model used for each pass of a growth tick.
models:
  generate: "claude-haiku-4-5"    # tier 1: plan + research + draft new topic files
  expand:   "claude-sonnet-4-6"   # tier 2: deepen each draft (detail, sources, links)
  enhance:  "claude-opus-4-8"     # tier 3: polish, build indices, sync seed, publish
  distill:  "claude-opus-4-8"     # rare: lineage meta-review on the frontier model

# Perpetual growth — every repo grows forever and is never consolidated,
# archived, or deleted. New eras spawn tangentially from the frontier; the hub
# decides when and what.
lifecycle:
  perpetual: true
  consolidate: false
  archive: false
  delete: false

# Cadence (UTC). The hub's orchestrate workflow runs daily; repos_per_run
# bounds how many members it grows per run (stalest-first rotation, so every
# member still grows perpetually — just not all 11 every day). Telemetry showed
# ~$3.4–4.8 recorded per tick's final pass alone; at repos_per_run: 4 each
# member grows roughly every 3 days at ~1/3 of the daily cost. Set 0 to grow
# every member every run (the pre-2026-07 behavior).
cadence:
  cron: "30 5 * * *"
  ticks_per_run: 1
  repos_per_run: 4
  selection: stalest-first

# Auth (org secrets the hub grow workflow needs):
#   CLAUDE_CODE_OAUTH_TOKEN  — primary auth for every model pass (subscription)
#   ANTHROPIC_API_KEY        — fallback auth
#   LIFECYCLE_PAT            — push content/telemetry back into each year repo
auth:
  primary: CLAUDE_CODE_OAUTH_TOKEN
  fallback: ANTHROPIC_API_KEY
  cross_repo: LIFECYCLE_PAT
