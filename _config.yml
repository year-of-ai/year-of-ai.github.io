# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# NOTE: When _config_dev.yml is layered on top (--config _config.yml,_config_dev.yml),
# the dev file MUST repeat this full list — Jekyll replaces, not merges, the exclude key.

exclude:
  # ── Repo docs that are not site pages ────────────────────────────────────
  # README.md is the GitHub repo readme, not the homepage (that lives in
  # pages/home.md). This exclude IS the guard against a "/" collision — README
  # has no front matter, so keep it listed here (don't rely on published:false).
  - README.md

  # ── Orchestration source data (not site content) ─────────────────────────
  # lineage/ holds the centralized seeds + bootstrap kit for the self-growing
  # year repos; the published view is pages/lineage.md.
  - lineage/

  # ── Jekyll cache ─────────────────────────────────────────────────────────
  - .sass-cache/
  - .jekyll-cache/

  # ── Obsidian vault working files ─────────────────────────────────────────
  - .obsidian/
  - "*.canvas"
  - "*.excalidraw.md"

  # ── IDE / editor config (dot-prefix dirs hidden by default; listed for clarity) ─
  - .cursor/
  - .devcontainer/
  - .frontmatter/
  - .github/
  - .vscode/

  # ── Ruby / Bundler ────────────────────────────────────────────────────────
  - Gemfile
  - Gemfile.lock
  - gemfiles/
  - jekyll-theme-zer0.gemspec
  - lib/
  - pkg/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

  # ── Node.js ───────────────────────────────────────────────────────────────
  - node_modules/
  - package.json
  - package-lock.json

  # ── Shell scripts and automation ──────────────────────────────────────────
  - scripts/
  - "*.sh"

  # ── Docker configuration ──────────────────────────────────────────────────
  - docker/
  - docker-compose.yml
  - docker-compose.test.yml

  # ── Build / task runners ──────────────────────────────────────────────────
  - Makefile
  - Rakefile

  # ── Project tooling metadata ──────────────────────────────────────────────
  - AGENTS.md
  - docs/
  - frontmatter.json
  - logs/
  - templates/
  - vendor-manifest.json
  - "*.code-workspace"

  # ── Submodules, tests, and authoring scaffolding ──────────────────────────
  - submodules/
  - test/
  - tests/
  - MERMAID-*.md
  - MERMAID-*/
  - pages/_notes/_templates/

# Sass/SCSS
sass:
  sass_dir: _sass
  style: expanded

